<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background:var(--bg-deep); }
  .wrap { padding: 22px 26px; }
  table { width:100%; border-collapse: collapse; }
  td { padding: 7px 0; vertical-align: baseline; }
  .tag {
    font-family: var(--font-mono); font-size: 9.5px;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted);
    width: 84px;
  }
  .px {
    font-family: var(--font-mono); font-size: 9.5px;
    letter-spacing: 0.1em; color: var(--text-muted);
    width: 72px;
  }
  .specimen {
    font-family: var(--font-display); font-weight: 800;
    color: var(--text); letter-spacing: -0.03em; line-height: 1.05;
  }
</style>
</head>
<body>
  <div class="wrap">
    <table>
      <tr><td class="tag">display</td><td class="px">80 / -4%</td><td><span class="specimen" style="font-size:46px;">Universo</span></td></tr>
      <tr><td class="tag">h1</td><td class="px">42 / -3%</td><td><span class="specimen" style="font-size:32px; letter-spacing:-0.03em;">Sobre o Projeto</span></td></tr>
      <tr><td class="tag">h2</td><td class="px">24 / -2%</td><td><span class="specimen" style="font-size:20px; font-weight:700; letter-spacing:-0.02em;">Aquisição de Peças</span></td></tr>
      <tr><td class="tag">h3</td><td class="px">18 / -2%</td><td><span class="specimen" style="font-size:16px; font-weight:700; letter-spacing:-0.02em;">Fluxograma de Montagem</span></td></tr>
    </table>
  </div>
</body>
</html>
