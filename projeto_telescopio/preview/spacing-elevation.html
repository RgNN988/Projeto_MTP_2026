<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background:var(--bg-deep); }
  .wrap { padding: 24px 26px; display: flex; align-items: center; gap: 14px; }
  .item { flex:1; display:flex; flex-direction:column; align-items:center; gap:10px; }
  .demo {
    width: 110px; height: 90px;
    background: var(--bg-surface);
    border-radius: 10px;
    border: 1px solid var(--border);
    position: relative;
  }
  .demo::before {
    content:''; position:absolute; inset:0; border-radius: inherit;
    background: linear-gradient(180deg, rgba(0,212,204,0.04) 0%, transparent 100%);
  }
  .lbl {
    font-family: var(--font-mono); font-size: 9px;
    letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted);
    text-align: center; line-height: 1.5;
  }
  .lbl strong { display:block; color: var(--primary); font-weight: 700; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="item">
      <div class="demo" style="box-shadow: 0 2px 24px rgba(0,0,0,0.28);"></div>
      <span class="lbl"><strong>sh-card</strong>0 2 24 / 28%</span>
    </div>
    <div class="item">
      <div class="demo" style="box-shadow: 0 14px 56px rgba(0,0,0,0.4), 0 0 28px rgba(0,212,204,0.055); border-color: rgba(0,212,204,0.32);"></div>
      <span class="lbl"><strong>sh-card-hi</strong>hover · halo</span>
    </div>
    <div class="item">
      <div class="demo" style="box-shadow: 0 0 28px rgba(0,212,204,0.22); border-color: rgba(0,212,204,0.55);"></div>
      <span class="lbl"><strong>glow-primary</strong>0 0 28 · 22%</span>
    </div>
    <div class="item">
      <div class="demo" style="box-shadow: 0 28px 90px rgba(0,0,0,0.65), 0 0 0 1px rgba(0,212,204,0.08); background: var(--bg-elevated);"></div>
      <span class="lbl"><strong>sh-modal</strong>deep + ring</span>
    </div>
  </div>
</body>
</html>
