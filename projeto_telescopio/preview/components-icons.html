<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background:var(--bg-deep); }
  .wrap { padding: 22px 26px; display:flex; flex-direction:column; gap: 16px; }
  .row { display:flex; gap: 16px; align-items: center; }
  .label {
    font-family: var(--font-mono); font-size: 9px;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted);
    width: 90px; flex-shrink:0;
  }
  .icon-box {
    width: 42px; height: 42px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    background: var(--primary-dim);
    border: 1px solid rgba(0,212,204,0.18);
  }
  .icon-box.alt { background: var(--secondary-dim); border-color: rgba(255,140,66,0.18); }
  .stack { display: flex; gap: 12px; align-items: center; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row">
      <span class="label">Standard · 1.5 stroke</span>
      <div class="stack">
        <div class="icon-box"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#00d4cc" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2.5"/><line x1="7" y1="8" x2="17" y2="8"/><line x1="7" y1="12" x2="17" y2="12"/><line x1="7" y1="16" x2="12" y2="16"/></svg></div>
        <div class="icon-box"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#00d4cc" stroke-width="1.5"><rect x="1" y="3" width="7" height="4" rx="1"/><rect x="8.5" y="10" width="7" height="4" rx="1"/><rect x="16" y="17" width="7" height="4" rx="1"/><polyline points="4.5,7 4.5,10.5 12,10.5" stroke-width="1"/><polyline points="12,14 12,17.5 16,17.5" stroke-width="1"/></svg></div>
        <div class="icon-box"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#00d4cc" stroke-width="1.5"><circle cx="9" cy="7" r="3"/><circle cx="15" cy="7" r="3"/><path d="M3 19c0-3.3 2.7-6 6-6h2"/><path d="M13 13h2c3.3 0 6 2.7 6 6"/></svg></div>
        <div class="icon-box alt"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ff8c42" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4"/><circle cx="12" cy="12" r="1" fill="#ff8c42"/><line x1="12" y1="3" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="21"/><line x1="3" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="21" y2="12"/></svg></div>
      </div>
    </div>
    <div class="row">
      <span class="label">Blueprint · dashed</span>
      <div class="stack">
        <div class="icon-box"><svg viewBox="0 0 40 40" width="24" height="24" fill="none">
          <rect x="6" y="17" width="28" height="8" rx="2" stroke="#00d4cc" stroke-width="1.3" stroke-dasharray="3,1.8"/>
          <ellipse cx="3.5" cy="21" rx="2.5" ry="5" stroke="#00d4cc" stroke-width="1.1" stroke-dasharray="2,1.5"/>
          <line x1="20" y1="25" x2="20" y2="30" stroke="#00d4cc" stroke-width="1.3" stroke-dasharray="3,1.8"/>
          <line x1="13" y1="30" x2="27" y2="30" stroke="#00d4cc" stroke-width="1.3" stroke-dasharray="3,1.8"/>
          <line x1="2" y1="13" x2="38" y2="13" stroke="rgba(0,212,204,0.18)" stroke-width="0.5"/>
        </svg></div>
        <div class="icon-box"><svg viewBox="0 0 40 40" width="24" height="24" fill="none">
          <rect x="10" y="22" width="20" height="12" rx="2" stroke="#00d4cc" stroke-width="1.3" stroke-dasharray="3,1.8"/>
          <polyline points="10,22 20,16 30,22" stroke="#00d4cc" stroke-width="1.3" stroke-dasharray="3,1.8"/>
          <circle cx="30" cy="13" r="4.5" stroke="#00d4cc" stroke-width="1.1" stroke-dasharray="2,1.5"/>
        </svg></div>
        <div class="icon-box"><svg viewBox="0 0 40 40" width="22" height="22" fill="none">
          <rect x="10" y="19" width="20" height="15" rx="2.5" stroke="#5b7a8a" stroke-width="1.3"/>
          <path d="M14 19v-5a6 6 0 1 1 12 0v5" stroke="#5b7a8a" stroke-width="1.3"/>
          <circle cx="20" cy="27" r="2" fill="#5b7a8a"/>
        </svg></div>
      </div>
    </div>
  </div>
</body>
</html>
