<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background:var(--bg-deep); overflow:hidden; }
  .nav {
    height: 60px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px;
    background: rgba(3,10,20,0.72);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border-bottom: 1px solid var(--border);
  }
  .logo {
    display: flex; align-items: center; gap: 9px;
    font-family: var(--font-display); font-weight: 700; font-size: 13px;
    letter-spacing: -0.02em; color: var(--text); text-decoration: none;
  }
  .logo svg { color: var(--primary); flex-shrink: 0; }
  .links { display:flex; gap: 1.8rem; list-style: none; padding:0; margin:0; }
  .links a {
    font-family: var(--font-mono); font-size: 9px;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--text-muted); text-decoration: none;
    position: relative; padding-bottom: 3px;
  }
  .links a.active { color: var(--primary); }
  .links a.active::after {
    content:''; position:absolute; left:0; bottom: -1px; width:100%; height:1px;
    background: var(--primary);
  }
  .bg {
    height: 70px;
    background:
      radial-gradient(ellipse 80% 100% at 50% 0%, rgba(0,55,75,0.5) 0%, transparent 70%),
      var(--bg-deep);
  }
</style>
</head>
<body>
  <nav class="nav">
    <a class="logo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
        <line x1="5" y1="19" x2="13" y2="11"/><line x1="13" y1="11" x2="19" y2="5"/>
        <line x1="9" y1="22" x2="5" y2="19"/>
        <circle cx="5" cy="19" r="1.4" fill="currentColor" stroke="none"/>
        <line x1="1.5" y1="17.5" x2="5" y2="19"/><line x1="3" y1="21" x2="5" y2="19"/>
      </svg>
      Projeto Telescópio
    </a>
    <ul class="links">
      <li><a class="active">Início</a></li>
      <li><a>Sobre</a></li>
      <li><a>Evolução</a></li>
      <li><a>Entregáveis</a></li>
      <li><a>Equipe</a></li>
    </ul>
  </nav>
  <div class="bg"></div>
</body>
</html>
