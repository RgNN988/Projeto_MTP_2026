<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background:var(--bg-deep); }
  .wrap { padding: 22px 26px; display:flex; gap: 14px; align-items: stretch; }
  .card {
    flex: 1;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 12px;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    text-align: center;
  }
  .avatar {
    width: 64px; height: 64px; border-radius: 50%;
    background: var(--primary-dim);
    border: 1.5px solid rgba(0,212,204,0.35);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 13px;
    font-weight: 700; color: var(--primary); letter-spacing: 0.05em;
    overflow: hidden;
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .name {
    font-family: var(--font-display); font-size: 12px; font-weight: 700;
    color: var(--text); letter-spacing: -0.01em; line-height: 1.3;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="avatar"><img src="../assets/photos/foto_rogerio.png" alt=""></div>
      <div class="name">Rogério De Lima Faria</div>
    </div>
    <div class="card">
      <div class="avatar"><img src="../assets/photos/foto_augusto.png" alt=""></div>
      <div class="name">Augusto Castilione</div>
    </div>
    <div class="card">
      <div class="avatar"><img src="../assets/photos/foto_ewerton.png" alt=""></div>
      <div class="name">Ewerton Gomes</div>
    </div>
    <div class="card">
      <div class="avatar"><img src="../assets/photos/foto_jean.png" alt=""></div>
      <div class="name">Jean Grossi</div>
    </div>
    <div class="card">
      <div class="avatar">LO</div>
      <div class="name">Lucas Oshiro</div>
    </div>
  </div>
</body>
</html>
