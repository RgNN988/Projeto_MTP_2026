<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background:var(--bg-deep); }
  .wrap { padding: 24px 28px; display:flex; gap: 18px; align-items: stretch; }
  .card {
    flex: 1;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 22px;
    display: flex; flex-direction: column; gap: 12px;
    position: relative; overflow: hidden;
    box-shadow: 0 2px 24px rgba(0,0,0,0.28);
  }
  .card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:1px;
    background: linear-gradient(90deg, transparent, var(--primary), transparent);
    opacity: 0.55;
  }
  .card.hover {
    border-color: rgba(0,212,204,0.32);
    transform: translateY(-6px);
    box-shadow: 0 14px 56px rgba(0,0,0,0.4), 0 0 28px rgba(0,212,204,0.055);
  }
  .card.hover::after {
    content:''; position:absolute; bottom:0; left:0; right:0; height:2px;
    background: linear-gradient(90deg, var(--primary), var(--secondary));
    transform: scaleX(1); transform-origin: left;
  }
  .icon {
    width: 38px; height: 38px; border-radius: 9px;
    background: var(--primary-dim);
    border: 1px solid rgba(0,212,204,0.18);
    display: flex; align-items: center; justify-content: center;
  }
  .title {
    font-family: var(--font-display); font-size: 16px; font-weight: 700;
    letter-spacing: -0.02em; color: var(--text);
  }
  .desc {
    font-family: var(--font-body); font-size: 12px; font-weight: 300;
    color: var(--text-muted); line-height: 1.6;
  }
  .state {
    position: absolute; bottom: 10px; right: 14px;
    font-family: var(--font-mono); font-size: 8.5px;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted);
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#00d4cc" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2.5"/>
          <line x1="7" y1="8" x2="17" y2="8"/>
          <line x1="7" y1="12" x2="17" y2="12"/>
          <line x1="7" y1="16" x2="12" y2="16"/>
        </svg>
      </div>
      <div class="title">Carta Morfológica</div>
      <div class="desc">Mapeamento das soluções construtivas para cada subsistema.</div>
      <span class="state">idle</span>
    </div>
    <div class="card hover">
      <div class="icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#00d4cc" stroke-width="1.5">
          <rect x="1" y="3" width="7" height="4" rx="1"/>
          <rect x="8.5" y="10" width="7" height="4" rx="1"/>
          <rect x="16" y="17" width="7" height="4" rx="1"/>
          <polyline points="4.5,7 4.5,10.5 12,10.5" stroke="#00d4cc" stroke-width="1"/>
          <polyline points="12,14 12,17.5 16,17.5" stroke="#00d4cc" stroke-width="1"/>
        </svg>
      </div>
      <div class="title">Fluxograma de Montagem</div>
      <div class="desc">Diagrama com todos os processos sequenciais de construção.</div>
      <span class="state" style="color: var(--primary);">hover · lift 6 · halo</span>
    </div>
  </div>
</body>
</html>
