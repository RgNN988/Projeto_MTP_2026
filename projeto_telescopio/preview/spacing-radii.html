<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background:var(--bg-deep); }
  .wrap { padding: 26px; display: flex; gap: 18px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box {
    background: var(--bg-surface);
    border: 1px solid var(--border);
  }
  .lbl {
    font-family: var(--font-mono); font-size: 9.5px;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted);
  }
  .val {
    font-family: var(--font-mono); font-size: 11px;
    letter-spacing: 0.08em; color: var(--primary);
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="item">
      <div class="box" style="width:68px; height:68px; border-radius:4px;"></div>
      <span class="val">4 px</span>
      <span class="lbl">r-sm</span>
    </div>
    <div class="item">
      <div class="box" style="width:68px; height:68px; border-radius:8px;"></div>
      <span class="val">8 px</span>
      <span class="lbl">r-md</span>
    </div>
    <div class="item">
      <div class="box" style="width:68px; height:68px; border-radius:12px;"></div>
      <span class="val">12 px</span>
      <span class="lbl">r-lg</span>
    </div>
    <div class="item">
      <div class="box" style="width:68px; height:68px; border-radius:999px;"></div>
      <span class="val">pill</span>
      <span class="lbl">r-pill</span>
    </div>
    <div class="item">
      <div class="box" style="width:68px; height:68px; border-radius:50%;"></div>
      <span class="val">circle</span>
      <span class="lbl">r-circle</span>
    </div>
  </div>
</body>
</html>
