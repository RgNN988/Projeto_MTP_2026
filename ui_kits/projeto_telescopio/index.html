<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projeto Telescópio · UI Kit</title>
  <link rel="stylesheet" href="../../colors_and_type.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg-deep);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      line-height: 1.75;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* keyframes — used by Hero + Evolucao */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-14px); }
    }
    @keyframes pulse-glow {
      0%, 100% { opacity: 1;    transform: scale(1); }
      50%      { opacity: 0.75; transform: scale(1.04); }
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes scroll-wheel {
      0%, 100% { transform: translateY(0); opacity: 1; }
      50%      { transform: translateY(8px); opacity: 0.3; }
    }

    /* responsive — collapse grids on smaller widths */
    @media (max-width: 900px) {
      [aria-labelledby="sobre-h2"] > div > div { grid-template-columns: 1fr !important; gap: 3rem !important; }
      [aria-labelledby="ent-h2"]   ~ * { grid-template-columns: 1fr; }
    }

    /* Title styling — solid color with subtle text-shadow glow.
       We previously used background-clip: text + gradient, but the editor
       wraps words in spans which breaks the clip. Solid color works
       reliably and still picks up the atmosphere via the inline textShadow. */
    #hero-h1, #hero-h1 * {
      background: none !important;
      -webkit-background-clip: border-box !important;
      background-clip: border-box !important;
      -webkit-text-fill-color: #ffffff !important;
      color: #ffffff !important;
    }
  </style>
</head>
<body>
  <main id="app"></main>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Three.js (for the 3D telescope) — OrbitControls is implemented inline below -->
  <script src="https://unpkg.com/three@0.149.0/build/three.min.js"></script>

  <!-- Components -->
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="Primitives.jsx"></script>
  <script type="text/babel" src="Nav.jsx"></script>
  <script type="text/babel" src="Telescope3D.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="Sobre.jsx"></script>
  <script type="text/babel" src="Evolucao.jsx"></script>
  <script type="text/babel" src="Entregaveis.jsx"></script>
  <script type="text/babel" src="Documentacao.jsx"></script>
  <script type="text/babel" src="Equipe.jsx"></script>
  <script type="text/babel" src="FooterBar.jsx"></script>
  <script type="text/babel" src="Modal.jsx"></script>

  <!-- App -->
  <script type="text/babel">
    // ─── ATMOSPHERE PRESETS ────────────────────────────────────────────────
    // Each preset retones the whole hero — primary/secondary, gradient hue,
    // 3D edge color, photo wash intensity. The visual brand stays but the
    // emotional register shifts.
    const ATMOSPHERES = {
      observatory: {
        label: 'Observatório',
        primary: '#00d4cc', primaryGlow: 'rgba(0,212,204,',
        secondary: '#ff8c42',
        bgPrimary: 'rgba(0,55,75,0.6)',
        bgWarm: 'rgba(255,140,66,0.07)',
        bgCool: 'rgba(0,212,204,0.05)',
        bodyTop: '#030a14', bodyMid: '#030f1e', bodyBot: '#020a18',
        photoWash: 'screen',
      },
      nebula: {
        label: 'Nebulosa',
        primary: '#c87aff', primaryGlow: 'rgba(200,122,255,',
        secondary: '#ff70b4',
        bgPrimary: 'rgba(60,20,90,0.7)',
        bgWarm: 'rgba(255,112,180,0.10)',
        bgCool: 'rgba(200,122,255,0.07)',
        bodyTop: '#0c0418', bodyMid: '#15052a', bodyBot: '#08021a',
        photoWash: 'screen',
      },
      sunset: {
        label: 'Poente',
        primary: '#ffa05e', primaryGlow: 'rgba(255,160,94,',
        secondary: '#ffd34d',
        bgPrimary: 'rgba(90,35,15,0.7)',
        bgWarm: 'rgba(255,211,77,0.10)',
        bgCool: 'rgba(255,160,94,0.06)',
        bodyTop: '#140805', bodyMid: '#1c0c08', bodyBot: '#0d0503',
        photoWash: 'screen',
      },
      noir: {
        label: 'Noir',
        primary: '#e8e8e8', primaryGlow: 'rgba(232,232,232,',
        secondary: '#a0a0a0',
        bgPrimary: 'rgba(30,30,30,0.7)',
        bgWarm: 'rgba(180,180,180,0.04)',
        bgCool: 'rgba(255,255,255,0.03)',
        bodyTop: '#070707', bodyMid: '#0c0c0c', bodyBot: '#040404',
        photoWash: 'luminosity',
      },
    };

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "atmosphere": "nebula",
      "finish": "animate",
      "density": 70
    }/*EDITMODE-END*/;

    const TweakContext = React.createContext(null);
    const useTweaksCtx = () => React.useContext(TweakContext);

    // Apply atmosphere to root CSS vars so the whole site retones smoothly
    const useAtmosphere = (atmosphere) => {
      React.useEffect(() => {
        const a = ATMOSPHERES[atmosphere] || ATMOSPHERES.observatory;
        const r = document.documentElement;
        r.style.setProperty('--primary', a.primary);
        r.style.setProperty('--secondary', a.secondary);
        r.style.setProperty('--primary-dim', a.primaryGlow + '0.10)');
        r.style.setProperty('--primary-glow', a.primaryGlow + '0.35)');
        r.style.setProperty('--border', a.primaryGlow + '0.14)');
        r.style.setProperty('--border-strong', a.primaryGlow + '0.38)');
        document.body.style.transition = 'background 1.4s cubic-bezier(0.22,1,0.36,1)';
      }, [atmosphere]);
    };

    const App = () => {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const atmos = ATMOSPHERES[t.atmosphere] || ATMOSPHERES.observatory;
      useAtmosphere(t.atmosphere);

      const [active, setActive] = React.useState('hero');
      const [modal, setModal] = React.useState({ open: false, deliverable: null });

      React.useEffect(() => {
        const sections = ['hero', 'sobre', 'evolucao', 'entregaveis', 'documentacao', 'equipe']
          .map((id) => document.getElementById(id))
          .filter(Boolean);
        const onScroll = () => {
          const y = window.scrollY + 120;
          let next = 'hero';
          for (const s of sections) {
            if (s.offsetTop <= y) next = s.id;
          }
          setActive(next);
        };
        onScroll();
        window.addEventListener('scroll', onScroll, { passive: true });
        return () => window.removeEventListener('scroll', onScroll);
      }, []);

      const openDeliverable = (d) => setModal({ open: true, deliverable: d });
      const closeModal = () => setModal({ open: false, deliverable: null });

      return (
        <TweakContext.Provider value={{ t, atmos }}>
          <ScrollProgress />
          <Nav active={active} />
          <Hero />
          <Divider />
          <Sobre />
          <Divider />
          <Evolucao />
          <Divider />
          <Entregaveis onOpen={openDeliverable} />
          <Divider />
          <Documentacao />
          <Divider />
          <Equipe />
          <FooterBar />
          <Modal open={modal.open} deliverable={modal.deliverable} onClose={closeModal} />

          <TweaksPanel title="Tweaks">
            <TweakSection label="Atmosfera" />
            <TweakSelect
              label="Mood"
              value={t.atmosphere}
              options={[
                { value: 'observatory', label: 'Observatório · padrão' },
                { value: 'nebula',      label: 'Nebulosa · arroxeado' },
                { value: 'sunset',      label: 'Poente · ambarino' },
                { value: 'noir',        label: 'Noir · monocromático' },
              ]}
              onChange={(v) => setTweak('atmosphere', v)}
            />

            <TweakSection label="Telescópio 3D" />
            <TweakSelect
              label="Acabamento"
              value={t.finish}
              options={[
                { value: 'animate',   label: 'Montagem em loop ★' },
                { value: 'wireframe', label: 'Wireframe' },
                { value: 'blueprint', label: 'Blueprint' },
                { value: 'hologram',  label: 'Holograma' },
              ]}
              onChange={(v) => setTweak('finish', v)}
            />

            <TweakSection label="Cosmos" />
            <TweakSlider
              label="Densidade"
              value={t.density}
              min={0} max={100} step={5}
              unit="%"
              onChange={(v) => setTweak('density', v)}
            />
          </TweaksPanel>
        </TweakContext.Provider>
      );
    };

    window.useTweaksCtx = useTweaksCtx;

    const ScrollProgress = () => {
      const [pct, setPct] = React.useState(0);
      React.useEffect(() => {
        const onScroll = () => {
          const h = document.documentElement;
          const total = h.scrollHeight - h.clientHeight;
          setPct(total > 0 ? (h.scrollTop / total) * 100 : 0);
        };
        onScroll();
        window.addEventListener('scroll', onScroll, { passive: true });
        return () => window.removeEventListener('scroll', onScroll);
      }, []);
      return (
        <div
          aria-hidden
          style={{
            position: 'fixed',
            top: 0, left: 0,
            zIndex: 999,
            height: '2px',
            width: pct + '%',
            background: 'linear-gradient(90deg, var(--primary), var(--secondary))',
            boxShadow: '0 0 10px rgba(0,212,204,0.7)',
            transition: 'width 0.08s linear',
            pointerEvents: 'none',
          }}
        />
      );
    };

    ReactDOM.createRoot(document.getElementById('app')).render(<App />);
  </script>
</body>
</html>
