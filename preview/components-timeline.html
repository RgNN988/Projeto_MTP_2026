<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background:var(--bg-deep); overflow:hidden; }
  .wrap { padding: 24px 28px; display:flex; gap: 28px; align-items: center; justify-content: center; }
  .phase {
    display: flex; flex-direction: column; align-items: center; text-align: center;
    flex: 1; max-width: 160px;
  }
  .dot {
    width: 50px; height: 50px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 12px; position: relative;
  }
  .phase.active .dot {
    background: rgba(0,212,204,0.10);
    border: 1.5px solid rgba(0,212,204,0.55);
    box-shadow: 0 0 0 8px rgba(0,212,204,0.055), 0 0 28px rgba(0,212,204,0.22);
  }
  .phase.locked .dot {
    background: rgba(11,21,36,0.8);
    border: 1px solid rgba(91,122,138,0.18);
  }
  .num {
    font-family: var(--font-mono); font-size: 9px;
    letter-spacing: 0.14em; text-transform: uppercase;
    margin-bottom: 3px;
  }
  .phase.active .num { color: var(--primary); }
  .phase.locked .num { color: var(--text-muted); }
  .name {
    font-family: var(--font-display); font-size: 13px; font-weight: 700;
    letter-spacing: -0.01em; margin-bottom: 6px;
  }
  .phase.active .name { color: var(--text); }
  .phase.locked .name { color: rgba(91,122,138,0.7); }
  .badge {
    font-family: var(--font-mono); font-size: 8px;
    letter-spacing: 0.12em; text-transform: uppercase;
    padding: 2px 8px; border-radius: 20px;
  }
  .phase.active .badge {
    background: rgba(0,212,204,0.10); color: var(--primary);
    border: 1px solid rgba(0,212,204,0.28);
  }
  .phase.locked .badge {
    background: rgba(11,21,36,0.5); color: var(--text-muted);
    border: 1px solid rgba(91,122,138,0.12);
  }
  .line {
    position: absolute; top: 36px; left: 8%; right: 8%; height: 1px;
    background: linear-gradient(90deg, var(--primary) 0%, var(--primary) 36%, rgba(0,212,204,0.4) 50%, rgba(91,122,138,0.15) 72%, transparent 100%);
    z-index: 0;
  }
  .wrap-rel { position: relative; }
</style>
</head>
<body>
  <div class="wrap-rel">
    <div class="line"></div>
    <div class="wrap">
      <div class="phase active">
        <div class="dot">
          <svg viewBox="0 0 40 40" width="22" height="22" fill="none">
            <rect x="6" y="17" width="28" height="8" rx="2" stroke="#00d4cc" stroke-width="1.3" stroke-dasharray="3,1.8"/>
            <ellipse cx="3.5" cy="21" rx="2.5" ry="5" stroke="#00d4cc" stroke-width="1.1" stroke-dasharray="2,1.5"/>
            <line x1="20" y1="25" x2="20" y2="30" stroke="#00d4cc" stroke-width="1.3" stroke-dasharray="3,1.8"/>
            <line x1="13" y1="30" x2="27" y2="30" stroke="#00d4cc" stroke-width="1.3" stroke-dasharray="3,1.8"/>
          </svg>
        </div>
        <div class="num">Fase 01</div>
        <div class="name">Planejamento</div>
        <div class="badge">Em andamento</div>
      </div>
      <div class="phase active">
        <div class="dot">
          <svg viewBox="0 0 40 40" width="22" height="22" fill="none">
            <rect x="10" y="22" width="20" height="12" rx="2" stroke="#00d4cc" stroke-width="1.3" stroke-dasharray="3,1.8"/>
            <polyline points="10,22 20,16 30,22" stroke="#00d4cc" stroke-width="1.3" stroke-dasharray="3,1.8"/>
            <circle cx="30" cy="13" r="4.5" stroke="#00d4cc" stroke-width="1.1" stroke-dasharray="2,1.5"/>
          </svg>
        </div>
        <div class="num">Fase 02</div>
        <div class="name">Aquisição</div>
        <div class="badge">Em andamento</div>
      </div>
      <div class="phase locked">
        <div class="dot">
          <svg viewBox="0 0 40 40" width="18" height="18" fill="none">
            <rect x="10" y="19" width="20" height="15" rx="2.5" stroke="#5b7a8a" stroke-width="1.3"/>
            <path d="M14 19v-5a6 6 0 1 1 12 0v5" stroke="#5b7a8a" stroke-width="1.3"/>
            <circle cx="20" cy="27" r="2" fill="#5b7a8a"/>
          </svg>
        </div>
        <div class="num">Fase 03</div>
        <div class="name">Montagem</div>
        <div class="badge">Bloqueado</div>
      </div>
    </div>
  </div>
</body>
</html>
