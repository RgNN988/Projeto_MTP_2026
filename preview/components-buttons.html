<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background:var(--bg-deep); }
  .wrap { padding: 28px 30px; display:flex; flex-direction:column; gap: 18px; }
  .row { display:flex; gap: 14px; align-items: center; }
  .btn-cta {
    display:inline-flex; align-items:center; gap:10px;
    padding: 0.85rem 2rem;
    background: rgba(0,212,204,0.10);
    border: 1px solid rgba(0,212,204,0.38);
    border-radius: 4px; color: var(--primary);
    font-family: var(--font-mono); font-size: 11px;
    letter-spacing: 0.14em; text-transform: uppercase;
    box-shadow: 0 0 28px rgba(0,212,204,0.07), inset 0 1px 0 rgba(255,255,255,0.04);
    text-decoration: none; cursor: pointer;
  }
  .btn-cta.hover {
    background: rgba(0,212,204,0.18);
    border-color: var(--primary); color: #fff;
    box-shadow: 0 6px 30px rgba(0,212,204,0.18), inset 0 1px 0 rgba(255,255,255,0.08);
    transform: translateY(-3px);
  }
  .btn-sm {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 0.45rem 1.1rem;
    border: 1px solid rgba(0,212,204,0.28); border-radius: 4px;
    background: transparent; color: var(--primary);
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 0.1em; text-transform: uppercase;
  }
  .btn-sm.secondary { border-color: rgba(255,140,66,0.28); color: var(--secondary); }
  .btn-sm.filled {
    background: var(--primary-dim); border-color: var(--primary);
  }
  .caption {
    font-family: var(--font-mono); font-size: 9px;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted);
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row">
      <a class="btn-cta">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="6.5" cy="6.5" r="5.5" stroke="currentColor" stroke-width="1.2"/><path d="M6.5 4V6.5M6.5 8.5V8.4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        Explorar o Projeto
      </a>
      <a class="btn-cta hover">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="6.5" cy="6.5" r="5.5" stroke="currentColor" stroke-width="1.2"/><path d="M6.5 4V6.5M6.5 8.5V8.4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        Hover
      </a>
    </div>
    <div class="row">
      <button class="btn-sm">
        <svg width="9" height="9" viewBox="0 0 9 9" fill="none"><path d="M1.5 7.5L7.5 1.5M7.5 1.5H3.5M7.5 1.5V5.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        Visualizar
      </button>
      <button class="btn-sm filled">
        <svg width="9" height="9" viewBox="0 0 9 9" fill="none"><path d="M1.5 7.5L7.5 1.5M7.5 1.5H3.5M7.5 1.5V5.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        Hover
      </button>
      <button class="btn-sm secondary">
        <svg width="9" height="9" viewBox="0 0 9 9" fill="none"><path d="M1.5 7.5L7.5 1.5M7.5 1.5H3.5M7.5 1.5V5.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        Secondary
      </button>
    </div>
    <div class="caption">CTA · primary outline + dim fill — hover lifts 3px · Small button · idle / hover / secondary</div>
  </div>
</body>
</html>
