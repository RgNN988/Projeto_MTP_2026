<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background:var(--bg-deep); overflow:hidden; }
  .wrap {
    position: relative;
    min-height: 260px;
    display:flex; align-items: center; justify-content: center;
    background:
      radial-gradient(ellipse 70% 70% at 50% 50%, rgba(0,55,75,0.55) 0%, transparent 65%),
      var(--bg-deep);
  }
  .scope {
    width: 220px;
    filter: drop-shadow(0 0 18px rgba(0,212,204,0.12));
  }
  .caption {
    position: absolute; bottom: 14px; left: 18px;
    font-family: var(--font-mono); font-size: 9px;
    letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-muted);
  }
  .caption strong { color: var(--primary); font-weight: 700; }
</style>
</head>
<body>
  <div class="wrap">
    <svg class="scope" viewBox="0 0 280 380" fill="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="140" y1="265" x2="55" y2="380" stroke="#1a3a5a" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="140" y1="265" x2="225" y2="380" stroke="#1a3a5a" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="140" y1="265" x2="140" y2="378" stroke="#1a3a5a" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="85" y1="330" x2="195" y2="330" stroke="#152e48" stroke-width="1.8" stroke-linecap="round"/>
      <ellipse cx="140" cy="264" rx="20" ry="9" fill="#0a1f38"/>
      <rect x="128" y="237" width="24" height="29" rx="3" fill="#0a1f38"/>
      <rect x="122" y="220" width="36" height="19" rx="4" fill="#0f2a46"/>
      <rect x="130" y="208" width="20" height="14" rx="3" fill="#0a2040"/>
      <rect x="72" y="132" width="136" height="48" rx="7" fill="#0a1f38" stroke="#183452" stroke-width="1.4"/>
      <rect x="72" y="132" width="136" height="6" rx="3" fill="#183452" opacity="0.5"/>
      <ellipse cx="72" cy="156" rx="11" ry="24" fill="#080f22" stroke="#00d4cc" stroke-width="1.4"/>
      <ellipse cx="72" cy="156" rx="5.5" ry="14" fill="#040c1e" stroke="rgba(0,212,204,0.3)" stroke-width="0.5"/>
      <ellipse cx="208" cy="156" rx="7.5" ry="16" fill="#080f22" stroke="#183452" stroke-width="1.2"/>
      <rect x="92" y="118" width="58" height="15" rx="3" fill="#080f22" stroke="#183452" stroke-width="1"/>
      <ellipse cx="72" cy="156" rx="14" ry="27" fill="none" stroke="rgba(0,212,204,0.12)" stroke-width="3"/>
      <circle cx="28" cy="95" r="1.4" fill="#00d4cc" opacity="0.9"/>
      <circle cx="255" cy="75" r="1" fill="#ffffff" opacity="0.55"/>
      <circle cx="35" cy="190" r="0.9" fill="#ffffff" opacity="0.4"/>
      <circle cx="248" cy="190" r="1.4" fill="#ff8c42" opacity="0.45"/>
      <circle cx="18" cy="145" r="0.7" fill="#ffffff" opacity="0.3"/>
      <circle cx="265" cy="130" r="0.7" fill="#a8d8ea" opacity="0.5"/>
    </svg>
    <div class="caption"><strong>Hero illustration</strong> · 280×380 SVG · floats ±14px over 7s</div>
  </div>
</body>
</html>
