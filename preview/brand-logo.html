<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background:var(--bg-deep); }
  .wrap {
    padding: 26px 28px;
    display: flex; gap: 28px; align-items: center;
  }
  .col { display: flex; flex-direction: column; gap: 8px; align-items: flex-start; }
  .full {
    display: flex; align-items: center; gap: 12px;
    font-family: var(--font-display); font-weight: 700;
    color: var(--text); letter-spacing: -0.02em;
  }
  .full svg { color: var(--primary); flex-shrink: 0; }
  .footer-style {
    font-family: var(--font-display); font-size: 22px; font-weight: 700;
    color: var(--text); letter-spacing: -0.02em;
  }
  .footer-style em {
    font-style: normal; color: var(--primary);
  }
  .lbl {
    font-family: var(--font-mono); font-size: 9px;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted);
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="col">
      <div class="full" style="font-size: 13px;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <line x1="5" y1="19" x2="13" y2="11"/><line x1="13" y1="11" x2="19" y2="5"/>
          <line x1="9" y1="22" x2="5" y2="19"/>
          <circle cx="5" cy="19" r="1.4" fill="currentColor" stroke="none"/>
          <line x1="1.5" y1="17.5" x2="5" y2="19"/><line x1="3" y1="21" x2="5" y2="19"/>
        </svg>
        Projeto Telescópio
      </div>
      <span class="lbl">Nav · 20px mark + Syne 700</span>
    </div>

    <div class="col">
      <div class="full" style="font-size: 24px;">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <line x1="5" y1="19" x2="13" y2="11"/><line x1="13" y1="11" x2="19" y2="5"/>
          <line x1="9" y1="22" x2="5" y2="19"/>
          <circle cx="5" cy="19" r="1.4" fill="currentColor" stroke="none"/>
          <line x1="1.5" y1="17.5" x2="5" y2="19"/><line x1="3" y1="21" x2="5" y2="19"/>
        </svg>
        Projeto Telescópio
      </div>
      <span class="lbl">Wide · 32px mark + 24px wordmark</span>
    </div>

    <div class="col">
      <div class="footer-style">Projeto <em>Telescópio</em></div>
      <span class="lbl">Footer style · teal accent on second word</span>
    </div>
  </div>
</body>
</html>
